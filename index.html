<style>
:root {
  --bg: #07090d;
  --surface: #0f1318;
  --surface2: #161c24;
  --border: #1e2736;
  --yellow: #f5c50a;
  --yellow-dim: #f5c50a18;
  --blue: #3db8f5;
  --blue-dim: #3db8f515;
  --blue-dark: #1a5f8a;
  --white: #eef2f7;
  --muted: #4a5568;
  --muted2: #718096;
  --win: #22c55e;
  --loss: #ef4444;
  --draw: #f5c50a;
  --font-title: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --radius: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 16px;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* Glow top */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, #3db8f520 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,9,13,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 2rem; height: 70px; gap: 1.5rem;
}
.logo-wrap {
  display: flex; align-items: center; gap: .9rem; flex-shrink: 0;
  text-decoration: none;
}
.logo-wrap img { height: 48px; width: auto; }
.logo-text { line-height: 1; }
.logo-text .club { font-family: var(--font-title); font-size: .65rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted2); }
.logo-text .event { font-family: var(--font-title); font-size: 1.55rem; font-weight: 900; letter-spacing: .04em; color: var(--yellow); line-height: .9; }
.logo-text .event span { color: var(--blue); }

/* ── NAV ── */
nav { display: flex; gap: .15rem; overflow-x: auto; flex: 1; justify-content: center; }
nav::-webkit-scrollbar { display: none; }
.nav-btn {
  font-family: var(--font-title); font-size: .95rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  padding: .5rem 1.1rem; border: 1px solid transparent; border-radius: 6px;
  background: transparent; color: var(--muted2); cursor: pointer; white-space: nowrap;
  transition: all .2s;
}
.nav-btn:hover { color: var(--white); background: var(--surface2); }
.nav-btn.active { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

.header-right {
  display: flex; align-items: center; gap: .5rem; flex-shrink: 0;
}
.hamburger-btn {
  display: none; flex-shrink: 0;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted2); padding: .45rem .7rem; border-radius: 6px;
  cursor: pointer; font-size: 1.1rem; line-height: 1; transition: all .2s;
  flex-direction: column; gap: 4px; align-items: center; justify-content: center;
}
.hamburger-btn:hover { color: var(--yellow); border-color: var(--yellow); }
.hamburger-btn .bar { width: 18px; height: 2px; background: currentColor; border-radius: 1px; transition: all .2s; }

/* Overlay menu mobile */
.mobile-menu-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
}
.mobile-menu-overlay.open { display: flex; }
.mobile-menu {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(300px, 85vw);
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 1.5rem 1.25rem; gap: .5rem; overflow-y: auto;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.mobile-menu-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border);
}
.mobile-menu-title {
  font-family: var(--font-title); font-size: 1.1rem; font-weight: 800;
  letter-spacing: .08em; text-transform: uppercase; color: var(--yellow);
}
.mobile-menu-close {
  background: transparent; border: 1px solid var(--border); color: var(--muted2);
  padding: .35rem .6rem; border-radius: 6px; cursor: pointer; font-size: 1rem;
  transition: all .2s;
}
.mobile-menu-close:hover { color: var(--loss); border-color: var(--loss); }
.mobile-nav-btn {
  font-family: var(--font-title); font-size: 1.05rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  padding: .85rem 1.1rem; border: 1px solid transparent; border-radius: 8px;
  background: transparent; color: var(--muted2); cursor: pointer; text-align: left;
  transition: all .15s; width: 100%;
}
.mobile-nav-btn:hover { color: var(--white); background: var(--surface2); border-color: var(--border); }
.mobile-nav-btn.active { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

.refresh-btn {
  flex-shrink: 0; background: transparent; border: 1px solid var(--border);
  color: var(--muted2); padding: .45rem .8rem; border-radius: 6px;
  cursor: pointer; font-size: .9rem; transition: all .2s; line-height: 1;
  display: flex; align-items: center; gap: .35rem;
}
.refresh-btn:hover { color: var(--yellow); border-color: var(--yellow); }
.refresh-btn.spinning .refresh-icon { animation: spin 1s linear infinite; display: inline-block; }
.refresh-countdown {
  font-family: var(--font-title); font-size: .72rem; font-weight: 700;
  color: var(--muted); min-width: 1.8rem; text-align: center;
}

/* ── HERO ── */
.hero {
  position: relative; z-index: 1;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d1520 0%, var(--bg) 100%);
  padding: 3rem 2rem 2.5rem;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; right: -100px; top: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(ellipse, #f5c50a08 0%, transparent 65%);
  pointer-events: none;
}
.hero-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
.hero-left h1 {
  font-family: var(--font-title); font-weight: 900;
  font-size: clamp(3rem, 6vw, 5.5rem); letter-spacing: .02em; line-height: .9;
  color: var(--white); text-transform: uppercase;
}
.hero-left h1 .accent { color: var(--yellow); display: block; }
.hero-left h1 .accent2 { color: var(--blue); }
.hero-sub {
  margin-top: 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: .4rem;
  font-family: var(--font-title); font-size: .8rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: .3rem .8rem; border-radius: 4px;
}
.hero-badge.blue { background: var(--blue-dim); border: 1px solid #3db8f540; color: var(--blue); }
.hero-badge.yellow { background: var(--yellow-dim); border: 1px solid #f5c50a40; color: var(--yellow); }
.hero-badge.muted { background: var(--surface2); border: 1px solid var(--border); color: var(--muted2); }
.hero-logo-bg {
  opacity: .06; position: absolute; right: 2rem; top: 50%; transform: translateY(-50%);
  height: 280px; pointer-events: none;
}

/* ── MAIN ── */
main { max-width: 1400px; margin: 0 auto; padding: 2.5rem 2rem; position: relative; z-index: 1; }
.section { display: none; }
.section.active { display: block; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
.filter-chip {
  padding: .35rem 1rem; border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--muted2);
  font-family: var(--font-title); font-size: .85rem; font-weight: 700;
  letter-spacing: .05em; cursor: pointer; transition: all .2s;
}
.filter-chip:hover { border-color: var(--blue); color: var(--blue); }
.filter-chip.active { background: var(--yellow); border-color: var(--yellow); color: #000; }

/* ── STATS ROW ── */
.stats-row {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: .75rem; margin-bottom: 2rem;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.1rem 1.3rem; animation: fadeUp .3s ease backwards;
}
.stat-label { font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: .3rem; }
.stat-val { font-family: var(--font-title); font-size: 2.4rem; font-weight: 800; color: var(--yellow); line-height: 1; }
.stat-val.blue { color: var(--blue); }
.stat-val.green { color: var(--win); }
.stat-val.muted { color: var(--muted2); }

/* ── DAY HEADER ── */
.day-header {
  margin: 2.5rem 0 1rem; display: flex; align-items: center; gap: .75rem;
}
.day-header h2 {
  font-family: var(--font-title); font-size: 1.4rem; font-weight: 800;
  letter-spacing: .08em; text-transform: uppercase; color: var(--blue); white-space: nowrap;
}
.day-header .line { flex: 1; height: 1px; background: var(--border); }
.day-header .count { font-size: .7rem; color: var(--muted); font-weight: 500; white-space: nowrap; }

/* ── CARDS GRID ── */
.cards-grid { display: grid; grid-template-columns: 1fr; gap: .75rem; }

/* ── MATCH CARD ── */
.match-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: .65rem;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  animation: fadeUp .25s ease backwards;
}
.match-card:hover {
  border-color: var(--blue-dark); transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(61,184,245,.08);
}
.match-card.has-result { border-left: 3px solid var(--border); }
.match-card.has-result:hover { border-left-color: var(--yellow); }

.match-meta { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
.match-time { font-family: var(--font-title); font-size: 1.25rem; font-weight: 800; color: var(--yellow); letter-spacing: .04em; }
.match-terrain {
  font-family: var(--font-title); font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  padding: .2rem .65rem; border-radius: 4px; white-space: nowrap;
}
.terrain-1 { background: #3db8f512; border: 1px solid #3db8f530; color: var(--blue); }
.terrain-2 { background: #f5c50a12; border: 1px solid #f5c50a30; color: var(--yellow); }
.terrain-3 { background: #22c55e12; border: 1px solid #22c55e30; color: #22c55e; }

.match-score {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: .4rem;
}
.team-name { font-weight: 600; font-size: .85rem; line-height: 1.3; }
.team-name.left { text-align: left; }
.team-name.right { text-align: right; }
.team-name.winner { color: var(--win); }
.team-name.loser { color: var(--muted); }

.score-block { display: flex; align-items: center; gap: .3rem; justify-content: center; }
.score-val { font-family: var(--font-title); font-size: 2rem; font-weight: 800; line-height: 1; min-width: 2.2rem; text-align: center; }
.score-val.winner { color: var(--win); }
.score-val.loser { color: var(--muted); }
.score-val.draw { color: var(--yellow); }
.score-sep { color: var(--muted); font-size: .75rem; }

.badge-pending { font-family: var(--font-title); font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted2); background: var(--surface2); border: 1px solid var(--border); padding: .25rem .65rem; border-radius: 4px; }
.badge-draw { font-family: var(--font-title); font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--yellow); background: var(--yellow-dim); border: 1px solid #f5c50a30; padding: .2rem .6rem; border-radius: 4px; }

/* ── POULES ── */
.category-title {
  font-family: var(--font-title); font-size: 1.8rem; font-weight: 900;
  letter-spacing: .06em; text-transform: uppercase; margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: .75rem;
}
.category-title .bar { width: 4px; height: 1.6rem; border-radius: 2px; }
.bar-yellow { background: var(--yellow); }
.bar-blue { background: var(--blue); }

.poules-grid { display: grid; grid-template-columns: 1fr; gap: .75rem; margin-bottom: 2.5rem; }
.poule-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; animation: fadeUp .3s ease backwards;
  transition: border-color .2s;
}
.poule-card:hover { border-color: var(--blue-dark); }
.poule-card-header {
  background: linear-gradient(135deg, var(--surface2) 0%, #111827 100%);
  padding: .7rem 1.1rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.poule-card-header h3 { font-family: var(--font-title); font-size: 1.1rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--yellow); }
.poule-count { font-size: .65rem; color: var(--muted); font-weight: 500; }
.poule-card ul { list-style: none; padding: .5rem 0; }
.poule-card li {
  padding: .45rem 1.1rem; font-size: .85rem; font-weight: 500;
  display: flex; align-items: center; gap: .6rem;
  border-left: 2px solid transparent; transition: all .15s;
}
.poule-card li:hover { background: var(--surface2); border-left-color: var(--blue); }
.team-num { font-family: var(--font-title); font-size: .8rem; font-weight: 700; color: var(--muted); min-width: 1.2rem; }

/* ── CLASSEMENT ── */
.classements-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; margin-bottom: 1rem; }
@media (min-width: 700px) { .classements-grid { grid-template-columns: repeat(2, 1fr); } }
.classement-block { margin-bottom: 0; }
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
thead tr { background: var(--surface2); }
thead th {
  padding: .6rem 1rem; text-align: left;
  font-family: var(--font-title); font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em; color: var(--muted); white-space: nowrap;
}
thead th:not(:first-child):not(:nth-child(2)) { text-align: center; }
tbody tr { border-top: 1px solid var(--border); transition: background .15s; animation: fadeUp .2s ease backwards; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: .65rem 1rem; vertical-align: middle; }
tbody td:not(:first-child):not(:nth-child(2)) { text-align: center; color: var(--muted2); }
.rank { font-family: var(--font-title); font-size: 1.1rem; font-weight: 700; color: var(--muted); width: 2rem; display: inline-block; text-align: center; }
.rank.gold { color: #f59e0b; }
.rank.silver { color: #94a3b8; }
.rank.bronze { color: #cd7c3f; }
.pts { font-family: var(--font-title); font-size: 1rem; font-weight: 700; color: var(--yellow); background: var(--yellow-dim); border: 1px solid #f5c50a30; padding: .15rem .6rem; border-radius: 4px; display: inline-block; min-width: 2.8rem; text-align: center; }
.diff-pos { color: var(--win); }
.diff-neg { color: var(--loss); }
.diff-null { color: var(--muted2); }

/* ── LOADING / EMPTY / ERROR ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 5rem 0; color: var(--muted); }
.loader { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
.loading p { font-size: .85rem; }
.empty-state { text-align: center; padding: 4rem; color: var(--muted); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; }
.empty-state p { font-size: .88rem; }

/* ── SECTION HEADER ── */
.section-head { margin-bottom: 1.75rem; }
.section-head h2 { font-family: var(--font-title); font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
.section-head p { color: var(--muted2); font-size: .85rem; margin-top: .3rem; }

/* ── DESKTOP : multi-colonnes (tablette+) ── */
@media (min-width: 700px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
  .poules-grid { grid-template-columns: repeat(2, 1fr); }
  .equipes-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 1100px) {
  .cards-grid { grid-template-columns: repeat(3, 1fr); }
  .poules-grid { grid-template-columns: repeat(3, 1fr); }
  .equipes-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── ANIMATIONS ── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── RESPONSIVE ── */
/* ── MOBILE (< 700px) : 1 colonne, grandes polices ── */
@media (max-width: 699px) {
  /* Force taille de base */
  html, body { font-size: 18px !important; }
  /* Layout */
  .header-inner { padding: 0 16px; height: 60px; gap: .75rem; overflow: hidden; }
  header { overflow: visible; }
  .hero { padding: 20px 16px 16px; }
  .hero-logo-bg { display: none; }
  main { padding: 16px 14px; }
  /* Grilles : 1 seule colonne */
  .cards-grid { grid-template-columns: 1fr; }
  .poules-grid { grid-template-columns: 1fr; }
  .equipes-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  /* Header & nav */
  .logo-wrap img { height: 36px !important; }
  .logo-text .event { font-size: 20px !important; }
  nav { display: none !important; }
  .hamburger-btn { display: flex !important; }
  /* Filtres scrollables horizontalement */
  .filter-bar { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; font-size: 16px !important; padding: 8px 18px; }
  /* Match card — texte agrandi */
  .match-card { padding: 22px 18px; gap: 14px; }
  .match-time { font-size: 28px !important; }
  .score-val { font-size: 44px !important; min-width: 48px; }
  .team-name { font-size: 17px !important; font-weight: 700; }
  .match-terrain { font-size: 13px !important; padding: 4px 12px; }
  .score-sep { font-size: 16px; }
  /* Poule card — texte agrandi */
  .poule-card-header { padding: 16px 20px; }
  .poule-card-header h3 { font-size: 22px !important; }
  .poule-count { font-size: 13px !important; }
  .poule-card li { font-size: 17px !important; padding: 12px 20px; }
  .team-num { font-size: 15px !important; }
  /* Équipes joueurs */
  .equipe-header { padding: 12px 18px; }
  .equipe-nom { font-size: 17px !important; }
  .equipe-joueurs { padding: 12px 18px; gap: 7px; }
  .joueur-tag { font-size: 14px !important; padding: 5px 12px; }
  /* Stats */
  .stat-card { padding: 16px 18px; }
  .stat-val { font-size: 34px !important; }
  .stat-label { font-size: 11px !important; }
  /* Hero */
  .hero-left h1 { font-size: 42px !important; }
  .hero-badge { font-size: 13px !important; padding: 6px 14px; }
  /* Day header */
  .day-header { margin: 28px 0 12px; }
  .day-header h2 { font-size: 22px !important; }
  .day-header .count { font-size: 13px !important; }
  /* Classements */
  .classements-grid { grid-template-columns: 1fr !important; gap: 16px; }
  .classement-block { margin-bottom: 0; }
  .section-head h2 { font-size: 26px !important; }
  table { font-size: 15px !important; }
  thead th { font-size: 12px !important; padding: 9px 10px; }
  tbody td { padding: 10px 10px; font-size: 14px !important; }
  .pts { font-size: 15px !important; padding: 3px 10px; }
  .rank { font-size: 17px !important; }
}

/* ── ÉQUIPES & JOUEURS ── */
.equipes-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: .75rem;
  margin-bottom: 1rem;
}
.equipe-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp .25s ease backwards;
  transition: border-color .2s;
}
.equipe-card:hover { border-color: var(--blue-dark); }
.equipe-header {
  background: var(--surface2);
  padding: .6rem 1rem;
  border-bottom: 1px solid var(--border);
}
.equipe-nom {
  font-family: var(--font-title);
  font-size: .95rem;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--white);
}
.equipe-joueurs {
  padding: .7rem 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
}
.joueur-tag {
  font-size: .75rem;
  font-weight: 500;
  padding: .2rem .6rem;
  border-radius: 4px;
  background: var(--blue-dim);
  border: 1px solid #3db8f525;
  color: var(--blue);
  white-space: nowrap;
}
</style>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyASx-40oswpSGaXok18OUUzkMrW2NcEJAd8S2uG17o39jztvmfEMP-gyhjbUCmkPzH/exec';

const cache = {};
let activeSection = 'calendrier';
let calData = null;
let activeDay = 'all';

const SECTIONS = [
  { id: 'calendrier',  label: '📅 Calendrier' },
  { id: 'poules',      label: '🏀 Participants & Poules' },
  { id: 'classements', label: 'Phase 1' },
  { id: 'phase2',      label: 'Phase 2' },
  { id: 'phasefinale', label: '🏆 Finales' },
];

function buildNav() {
  // Nav desktop
  document.getElementById('nav').innerHTML = SECTIONS.map(s =>
    `<button class="nav-btn ${s.id===activeSection?'active':''}" onclick="switchSection('${s.id}')">${s.label}</button>`
  ).join('');
  // Nav mobile
  document.getElementById('mobileNav').innerHTML = SECTIONS.map(s =>
    `<button class="mobile-nav-btn ${s.id===activeSection?'active':''}" onclick="switchSectionMobile('${s.id}')">${s.label}</button>`
  ).join('');
}

function toggleMobileMenu() {
  document.getElementById('mobileMenuOverlay').classList.toggle('open');
}
function closeMobileMenu() {
  document.getElementById('mobileMenuOverlay').classList.remove('open');
}
function switchSectionMobile(id) {
  closeMobileMenu();
  switchSection(id);
}

// ── AUTO-REFRESH TOUTES LES 30s ──
const AUTO_REFRESH_INTERVAL = 30; // secondes
let countdownValue = AUTO_REFRESH_INTERVAL;
let countdownTimer = null;
let autoRefreshTimer = null;

function startAutoRefresh() {
  clearInterval(countdownTimer);
  clearTimeout(autoRefreshTimer);
  countdownValue = AUTO_REFRESH_INTERVAL;
  updateCountdown();

  countdownTimer = setInterval(() => {
    countdownValue--;
    updateCountdown();
    if (countdownValue <= 0) {
      clearInterval(countdownTimer);
      triggerAutoRefresh();
    }
  }, 1000);
}

function updateCountdown() {
  const el = document.getElementById('refreshCountdown');
  if (el) el.textContent = countdownValue > 0 ? countdownValue + 's' : '';
}

function triggerAutoRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  Object.keys(cache).forEach(k => delete cache[k]);
  // Invalide le cache de la section active
  ['classmentsContent','poulesContent','phase2Content','phasefinaleContent'].forEach(id => {
    const el = document.getElementById(id);
    if (el) delete el.dataset.loaded;
  });
  calData = null;
  loadSection(activeSection, true);
  setTimeout(() => {
    btn.classList.remove('spinning');
    startAutoRefresh(); // relance le compte à rebours
  }, 1200);
}

function switchSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  activeSection = id;
  buildNav();
  loadSection(id);
}

function callAPI(action) {
  if (cache[action]) return Promise.resolve(cache[action]);
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + action + '_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout — vérifiez le déploiement Apps Script.'));
    }, 10000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data) { cleanup(); cache[action] = data; resolve(data); };
    script.src = SCRIPT_URL + '?action=' + action + '&callback=' + cbName;
    script.onerror = () => { cleanup(); reject(new Error('Erreur réseau.')); };
    document.head.appendChild(script);
  });
}

function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  Object.keys(cache).forEach(k => delete cache[k]);
  if (activeSection === 'classements') delete document.getElementById('classmentsContent').dataset.loaded;
  if (activeSection === 'poules') delete document.getElementById('poulesContent').dataset.loaded;
  if (activeSection === 'phase2') delete document.getElementById('phase2Content').dataset.loaded;
  if (activeSection === 'phasefinale') delete document.getElementById('phasefinaleContent').dataset.loaded;
  calData = null;
  loadSection(activeSection, true);
  setTimeout(() => {
    btn.classList.remove('spinning');
    startAutoRefresh(); // reset le compteur après refresh manuel
  }, 1000);
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    'Màj ' + now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function loadSection(id, force=false) {
  switch(id) {
    case 'calendrier':  renderCalendrier(force); break;
    case 'poules':      renderPoules(force);     break;
    case 'classements': renderClassements(force);break;
    case 'phase2':      renderPhase2(force);     break;
    case 'phasefinale': renderPhasefinale(force);break;
  }
}

// ── CALENDRIER ──
async function renderCalendrier(force=false) {
  const el = document.getElementById('calendrierContent');
  const filterEl = document.getElementById('filterDay');
  if (!force && calData) { renderMatchList(calData, el); return; }
  el.innerHTML = loadingHTML();
  try {
    const data = await callAPI('getCalendrier');
    calData = data.matches || [];
    updateTimestamp();

    const played = calData.filter(m => m.sc1 !== null).length;
    document.getElementById('matchCount').textContent = calData.length + ' matchs';

    const days = ['all', ...new Set(calData.map(m => m.jour).filter(Boolean))];
    filterEl.innerHTML = days.map(d =>
      `<button class="filter-chip ${d===activeDay?'active':''}" onclick="filterByDay('${d}')">${d==='all'?'🗓 Tous':d}</button>`
    ).join('') +
    `<button class="filter-chip ${activeDay==='t1'?'active':''}" onclick="filterByDay('t1')">🟧 Terrain 1</button>
     <button class="filter-chip ${activeDay==='t2'?'active':''}" onclick="filterByDay('t2')">🟦 Terrain 2</button>
     <button class="filter-chip ${activeDay==='t3'?'active':''}" onclick="filterByDay('t3')">🟩 Terrain 3</button>`;

    renderMatchList(calData, el);
  } catch(e) { el.innerHTML = errorHTML(e.message); }
}

function filterByDay(day) {
  activeDay = day;
  document.querySelectorAll('#filterDay .filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  renderMatchList(calData, document.getElementById('calendrierContent'));
}

function renderMatchList(matches, el) {
  let filtered = [...matches];
  if (activeDay === 't1') filtered = filtered.filter(m => m.terrain === 1);
  else if (activeDay === 't2') filtered = filtered.filter(m => m.terrain === 2);
  else if (activeDay === 't3') filtered = filtered.filter(m => m.terrain === 3);
  else if (activeDay !== 'all') filtered = filtered.filter(m => m.jour === activeDay);

  if (!filtered.length) { el.innerHTML = emptyHTML(); return; }

  const played = filtered.filter(m => m.sc1 !== null).length;
  const terrains = [...new Set(filtered.map(m=>m.terrain))].length;

  let html = `<div class="stats-row">
    <div class="stat-card" style="animation-delay:.05s"><div class="stat-label">Total matchs</div><div class="stat-val">${filtered.length}</div></div>
    <div class="stat-card" style="animation-delay:.1s"><div class="stat-label">Joués</div><div class="stat-val green">${played}</div></div>
    <div class="stat-card" style="animation-delay:.15s"><div class="stat-label">À venir</div><div class="stat-val blue">${filtered.length-played}</div></div>
    <div class="stat-card" style="animation-delay:.2s"><div class="stat-label">Terrains</div><div class="stat-val muted">${terrains}</div></div>
  </div>`;

  const byDay = {};
  filtered.forEach(m => { const k = m.jour||'?'; if(!byDay[k]) byDay[k]=[]; byDay[k].push(m); });

  let delay = 0;
  for (const [jour, list] of Object.entries(byDay)) {
    html += `<div class="day-header"><h2>📅 ${jour}</h2><div class="line"></div><span class="count">${list.length} matchs</span></div>`;
    html += '<div class="cards-grid">';
    list.forEach(m => {
      delay++;
      const played = m.sc1 !== null && m.sc2 !== null;
      const draw = played && m.sc1 === m.sc2;
      const w1 = played && !draw && m.sc1 > m.sc2;
      const w2 = played && !draw && m.sc2 > m.sc1;
      const tClass = ['','terrain-1','terrain-2','terrain-3'][m.terrain]||'terrain-1';
      const tLabel = ['','T1','T2','T3'][m.terrain]||'T?';
      html += `
      <div class="match-card ${played?'has-result':''}" style="animation-delay:${delay*.025}s">
        <div class="match-meta">
          <span class="match-time">${m.heure}</span>
          <span class="match-terrain ${tClass}">${tLabel}</span>
        </div>
        <div class="match-score">
          <div class="team-name left ${w1?'winner':played&&!draw?'loser':''}">${m.eq1}</div>
          <div class="score-block">
            ${played
              ? `<span class="score-val ${w1?'winner':draw?'draw':'loser'}">${m.sc1}</span>
                 <span class="score-sep">—</span>
                 <span class="score-val ${w2?'winner':draw?'draw':'loser'}">${m.sc2}</span>`
              : `<span class="badge-pending">À venir</span>`}
          </div>
          <div class="team-name right ${w2?'winner':played&&!draw?'loser':''}">${m.eq2}</div>
        </div>
        ${draw?'<div style="text-align:center"><span class="badge-draw">Égalité</span></div>':''}
      </div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

// ── POULES ──
async function renderPoules(force=false) {
  const el = document.getElementById('poulesContent');
  if (!force && el.dataset.loaded) return;
  el.innerHTML = loadingHTML();
  try {
    const data = await callAPI('getPoules');
    updateTimestamp();

    const compet = data.compet || {};
    const loisir = data.loisir || {};
    const equipesCompet = data.equipesCompet || [];
    const equipesLoisir = data.equipesLoisir || [];

    let html = '';

    // ── Poules COMPET ──
    if (Object.keys(compet).length) {
      html += `<div class="section-head"><h2><span style="color:var(--yellow)">⚡</span> Catégorie COMPET</h2></div>`;
      html += '<div class="poules-grid">';
      let d = 0;
      for (const [nom, equipes] of Object.entries(compet)) {
        d++;
        html += `<div class="poule-card" style="animation-delay:${d*.05}s">
          <div class="poule-card-header">
            <h3>${nom}</h3>
            <span class="poule-count">${equipes.length} équipes</span>
          </div>
          <ul>${equipes.map((e,i) => `<li><span class="team-num">${i+1}</span>${e}</li>`).join('')}</ul>
        </div>`;
      }
      html += '</div>';
    }

    // ── Équipes COMPET avec joueurs ──
    if (equipesCompet.length) {
      html += `<div class="section-head" style="margin-top:2.5rem"><h2 style="font-size:1.3rem;color:var(--muted2)">Composition des équipes COMPET</h2></div>`;
      html += '<div class="equipes-grid">';
      equipesCompet.forEach((eq, i) => {
        html += `<div class="equipe-card" style="animation-delay:${i*.03}s">
          <div class="equipe-header"><span class="equipe-nom">${eq.nom}</span></div>
          <div class="equipe-joueurs">
            ${eq.joueurs.length
              ? eq.joueurs.map(j => `<span class="joueur-tag">${j}</span>`).join('')
              : '<span style="color:var(--muted);font-size:.78rem">Aucun joueur renseigné</span>'}
          </div>
        </div>`;
      });
      html += '</div>';
    }

    // ── Poules LOISIR ──
    if (Object.keys(loisir).length) {
      html += `<div class="section-head" style="margin-top:2.5rem"><h2><span style="color:var(--blue)">🎯</span> Catégorie LOISIR</h2></div>`;
      html += '<div class="poules-grid">';
      let d = 0;
      for (const [nom, equipes] of Object.entries(loisir)) {
        d++;
        html += `<div class="poule-card" style="animation-delay:${d*.05}s">
          <div class="poule-card-header" style="background:linear-gradient(135deg,#0d1a2a,#111827)">
            <h3 style="color:var(--blue)">${nom}</h3>
            <span class="poule-count">${equipes.length} équipes</span>
          </div>
          <ul>${equipes.map((e,i) => `<li><span class="team-num">${i+1}</span>${e}</li>`).join('')}</ul>
        </div>`;
      }
      html += '</div>';
    }

    // ── Équipes LOISIR avec joueurs ──
    if (equipesLoisir.length) {
      html += `<div class="section-head" style="margin-top:2.5rem"><h2 style="font-size:1.3rem;color:var(--muted2)">Composition des équipes LOISIR</h2></div>`;
      html += '<div class="equipes-grid">';
      equipesLoisir.forEach((eq, i) => {
        html += `<div class="equipe-card" style="animation-delay:${i*.03}s">
          <div class="equipe-header"><span class="equipe-nom">${eq.nom}</span></div>
          <div class="equipe-joueurs">
            ${eq.joueurs.length
              ? eq.joueurs.map(j => `<span class="joueur-tag">${j}</span>`).join('')
              : '<span style="color:var(--muted);font-size:.78rem">Aucun joueur renseigné</span>'}
          </div>
        </div>`;
      });
      html += '</div>';
    }

    if (!html) { el.innerHTML = emptyHTML('Aucune poule trouvée.'); return; }
    el.innerHTML = html;
    el.dataset.loaded = '1';
  } catch(e) { el.innerHTML = errorHTML(e.message); }
}

// ── CLASSEMENTS ──
async function renderClassements(force=false) {
  const el = document.getElementById('classmentsContent');
  if (!force && el.dataset.loaded) return;
  el.innerHTML = loadingHTML();
  try {
    const data = await callAPI('getClassements');
    updateTimestamp();
    const compet = data.compet || {};
    const loisir = data.loisir || {};

    // Filtre actif
    let activeFilter = el.dataset.filter || 'all';

    function renderContent() {
      const hasCompet = Object.keys(compet).length > 0;
      const hasLoisir = Object.keys(loisir).length > 0;

      // Barre de filtres
      let html = `<div class="filter-bar" style="margin-bottom:1.75rem">
        <button class="filter-chip ${activeFilter==='all'?'active':''}" onclick="setClassFilter('all')">🏅 Toutes les poules</button>
        ${hasCompet ? `<button class="filter-chip ${activeFilter==='compet'?'active':''}" onclick="setClassFilter('compet')">⚡ COMPET</button>` : ''}
        ${hasLoisir ? `<button class="filter-chip ${activeFilter==='loisir'?'active':''}" onclick="setClassFilter('loisir')">🎯 LOISIR</button>` : ''}
      </div>`;

      function pouleTable(nom, equipes, color, delay) {
        if (!equipes || !equipes.length) return '';
        return `<div class="classement-block" style="animation-delay:${delay}s">
          <div class="section-head" style="margin-bottom:1rem">
            <h2 style="font-size:1.4rem"><span style="color:${color}">${nom}</span></h2>
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>#</th><th>Équipe</th></tr></thead>
            <tbody>${equipes.map((r,i) => {
              const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
              return `<tr style="animation-delay:${i*.04}s">
                <td><span class="rank ${rc}">${i+1}</span></td>
                <td><strong>${r.eq}</strong></td>
              </tr>`;
            }).join('')}</tbody>
          </table></div>
        </div>`;
      }

      // Grille COMPET (2 colonnes sur tablette+)
      if ((activeFilter === 'all' || activeFilter === 'compet') && hasCompet) {
        html += `<div class="section-head"><h2><span style="color:var(--yellow)">⚡</span> Catégorie COMPET</h2></div>`;
        html += '<div class="classements-grid">';
        let d = 0;
        for (const [nom, equipes] of Object.entries(compet)) {
          html += pouleTable(nom, equipes, 'var(--yellow)', d * 0.07);
          d++;
        }
        html += '</div>';
      }

      // Grille LOISIR
      if ((activeFilter === 'all' || activeFilter === 'loisir') && hasLoisir) {
        html += `<div class="section-head" style="margin-top:2.5rem"><h2><span style="color:var(--blue)">🎯</span> Catégorie LOISIR</h2></div>`;
        html += '<div class="classements-grid">';
        let d = 0;
        for (const [nom, equipes] of Object.entries(loisir)) {
          html += pouleTable(nom, equipes, 'var(--blue)', d * 0.07);
          d++;
        }
        html += '</div>';
      }

      if (!hasCompet && !hasLoisir) {
        html += emptyHTML('Classements non disponibles — les données de la 1ère phase ne sont pas encore renseignées.');
      }

      el.innerHTML = html;
    }

    window.setClassFilter = function(f) {
      activeFilter = f;
      el.dataset.filter = f;
      document.querySelectorAll('#classmentsContent .filter-chip').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      renderContent();
    };

    renderContent();
    el.dataset.loaded = '1';
  } catch(e) { el.innerHTML = errorHTML(e.message); }
}

// ── PHASE 2 ──
async function renderPhase2(force=false) {
  const el = document.getElementById('phase2Content');
  if (!force && el.dataset.loaded) return;
  el.innerHTML = loadingHTML();
  try {
    const data = await callAPI('getPhase2');
    if (data.error) { el.innerHTML = errorHTML(data.error); return; }
    updateTimestamp();

    const poules = data.poules || {};
    if (!Object.keys(poules).length) {
      el.innerHTML = emptyHTML('Les données de la Phase 2 ne sont pas encore disponibles.');
      return;
    }

    // Couleurs par catégorie
    const colors = { 'Elite A': 'var(--yellow)', 'Elite B': 'var(--yellow)', 'Inter A': 'var(--blue)', 'Inter B': 'var(--blue)' };

    function pouleCard(nom, equipes, delay) {
      const color = colors[nom] || 'var(--yellow)';
      const allRanked = equipes.length > 0 && equipes.every(e => e.rang !== null);
      const rows = equipes.map((e, i) => {
        const pos = allRanked ? e.rang : null;
        const rc  = pos === 1 ? 'gold' : pos === 2 ? 'silver' : pos === 3 ? 'bronze' : '';
        return `<tr>
          <td>${pos !== null
            ? `<span class="rank ${rc}">${pos}</span>`
            : `<span style="color:var(--muted);font-size:.75rem">—</span>`
          }</td>
          <td><strong>${e.eq}</strong></td>
        </tr>`;
      }).join('');

      return `<div class="classement-block" style="animation-delay:${delay}s">
        <div class="section-head" style="margin-bottom:1rem">
          <h2 style="font-size:1.4rem"><span style="color:${color}">${nom}</span></h2>
          ${!allRanked ? `<p style="font-size:.75rem;color:var(--muted);margin-top:.3rem">Classement en attente</p>` : ''}
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>#</th><th>Équipe</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    }

    let html = '<div class="classements-grid">';
    let d = 0;
    for (const [nom, equipes] of Object.entries(poules)) {
      html += pouleCard(nom, equipes, d * 0.07);
      d++;
    }
    html += '</div>';

    el.innerHTML = html;
    el.dataset.loaded = '1';
  } catch(e) { el.innerHTML = errorHTML(e.message); }
}

// ── PHASE FINALE ──
async function renderPhasefinale(force=false) {
  const el = document.getElementById('phasefinaleContent');
  if (!force && el.dataset.loaded) return;
  el.innerHTML = loadingHTML();
  try {
    const data = await callAPI('getPhasefinale');
    const matches = data.matches || [];
    updateTimestamp();
    if (!matches.length) { el.innerHTML = emptyHTML('Phase finale non disponible.'); return; }
    el.innerHTML = genericMatchesHTML(matches, '🏆 Phase Finale');
    el.dataset.loaded = '1';
  } catch(e) { el.innerHTML = errorHTML(e.message); }
}

function genericMatchesHTML(matches, title) {
  let html = `<div class="day-header" style="margin-top:0"><h2>${title}</h2><div class="line"></div><span class="count">${matches.length} matchs</span></div><div class="cards-grid">`;
  matches.forEach((m,i) => {
    const played = m.sc1!==null && m.sc2!==null;
    const draw = played && m.sc1===m.sc2;
    const w1 = played && !draw && m.sc1>m.sc2;
    const w2 = played && !draw && m.sc2>m.sc1;
    html += `<div class="match-card ${played?'has-result':''}" style="animation-delay:${i*.03}s">
      <div class="match-meta">
        <span class="match-time">${m.heure||m.label||''}</span>
        ${m.groupe?`<span class="match-terrain terrain-1">${m.groupe}</span>`:''}
      </div>
      <div class="match-score">
        <div class="team-name left ${w1?'winner':played&&!draw?'loser':''}">${m.eq1}</div>
        <div class="score-block">
          ${played
            ? `<span class="score-val ${w1?'winner':draw?'draw':'loser'}">${m.sc1}</span>
               <span class="score-sep">—</span>
               <span class="score-val ${w2?'winner':draw?'draw':'loser'}">${m.sc2}</span>`
            : `<span class="badge-pending">À venir</span>`}
        </div>
        <div class="team-name right ${w2?'winner':played&&!draw?'loser':''}">${m.eq2}</div>
      </div>
      ${draw?'<div style="text-align:center"><span class="badge-draw">Égalité</span></div>':''}
    </div>`;
  });
  return html + '</div>';
}

function loadingHTML() { return '<div class="loading"><div class="loader"></div><p>Chargement…</p></div>'; }
function emptyHTML(m='Aucune donnée disponible.') { return `<div class="empty-state"><div class="icon">🏀</div><p>${m}</p></div>`; }
function errorHTML(m) { return `<div class="empty-state"><div class="icon">⚠️</div><p style="color:var(--loss)">Erreur de chargement</p><p style="margin-top:.5rem;font-size:.8rem">${m}</p></div>`; }

buildNav();
// Copie le src du logo header dans le menu mobile
document.getElementById('mobileLogo').src = document.querySelector('.logo-wrap img').src;
loadSection('calendrier');
startAutoRefresh();
</script>
</body>
</html>
